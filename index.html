<h2>概要</h2>

<p>
INN-OSはDiscordコミュニティ向けに開発した、Discord既存機能の強化BOTです。
募集、プロフィール/自己紹介の検索性向上、通知機能、VC管理などの基盤機能を提供し、サーバーをより使いやすく整理します。
</p>

<h2>主な機能</h2>

<ul>
<li>募集管理</li>
<li>プロフィール・自己紹介検索</li>
<li>通知管理</li>
<li>VC管理</li>
<li>コミュニティ基盤機能</li>
</ul>
